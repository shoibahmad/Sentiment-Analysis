services:
  - type: web
    name: aura-sentiment-engine
    runtime: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"

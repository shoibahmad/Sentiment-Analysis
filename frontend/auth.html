<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, rgba(0, 0, 0, 0) 60%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
    <div class="bg-glow"></div>

    <div class="relative z-10 w-full max-w-md p-8 glass-card rounded-3xl">
        <div class="text-center mb-8">
            <a href="index.html"
                class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-white text-black font-bold text-2xl mb-4 shadow-[0_0_15px_rgba(255,255,255,0.2)]">A</a>
            <h2 class="text-3xl font-bold tracking-tight" id="formTitle">Welcome back</h2>
            <p class="text-gray-400 text-sm mt-2" id="formSubtitle">Enter your credentials to access Aura.</p>
        </div>

        <div id="authError"
            class="hidden mb-6 p-3 rounded-lg bg-red-900/30 border border-red-500/50 text-red-400 text-sm text-center">
        </div>

        <form id="authForm" class="space-y-4">
            <div id="nameFieldGroup" class="hidden">
                <label class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
                <input type="text" id="fullname"
                    class="w-full px-4 py-3 rounded-xl bg-[#0c0c0c] border border-[#333] focus:outline-none focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500 text-white placeholder-gray-600 transition-all font-medium"
                    placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-xl bg-[#0c0c0c] border border-[#333] focus:outline-none focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500 text-white placeholder-gray-600 transition-all font-medium"
                    placeholder="name@company.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 rounded-xl bg-[#0c0c0c] border border-[#333] focus:outline-none focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500 text-white placeholder-gray-600 transition-all font-medium"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3 px-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition-colors shadow-[0_0_15px_rgba(255,255,255,0.1)] flex justify-center items-center">
                <span>Sign In</span>
            </button>
        </form>

        <div class="mt-6 flex items-center justify-center gap-4">
            <div class="h-px bg-[#333] flex-1"></div>
            <span class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Or continue with</span>
            <div class="h-px bg-[#333] flex-1"></div>
        </div>

        <div class="mt-6">
            <button id="googleBtn"
                class="w-full py-3 px-4 bg-[#111] border border-[#333] hover:bg-[#1a1a1a] text-white font-medium rounded-xl transition-colors flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        class="fill-[#4285F4]" />
                    <path fill="currentColor"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        class="fill-[#34A853]" />
                    <path fill="currentColor"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        class="fill-[#FBBC05]" />
                    <path fill="currentColor"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        class="fill-[#EA4335]" />
                </svg>
                Google
            </button>
        </div>

        <div class="mt-8 text-center text-sm text-gray-400">
            <span id="toggleText">Don't have an account?</span>
            <button id="toggleModeBtn" class="text-white font-medium hover:underline ml-1">Sign Up</button>
        </div>
    </div>

    <script type="module" src="/js/auth.js"></script>
</body>

</html>
